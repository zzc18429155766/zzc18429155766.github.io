<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | AI Developer Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #e6edf3; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .error-page { text-align: center; padding: 40px; }
        .error-code { font-size: 8em; font-weight: bold; background: linear-gradient(90deg, #58a6ff, #f78166); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        .error-message { font-size: 1.5em; color: #8b949e; margin-bottom: 40px; }
        .error-links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        .error-links a { display: inline-block; padding: 12px 24px; background: #238636; color: white; text-decoration: none; border-radius: 6px; font-weight: 600; transition: background 0.2s; }
        .error-links a:hover { background: #2ea043; }
        .error-links a.secondary { background: transparent; border: 1px solid #30363d; }
        .error-links a.secondary:hover { background: #21262d; border-color: #8b949e; }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">404</div>
        <p class="error-message">Oops! The page you're looking for doesn't exist.</p>
        <div class="error-links">
            <a href="/">Go Home</a>
            <a href="/blog.html" class="secondary">Read Blog</a>
            <a href="https://zzcwhisper4.gumroad.com/" class="secondary">Browse Products</a>
        </div>
    </div>
</body>
</html>
